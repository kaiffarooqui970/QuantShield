version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantshield-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # live sync – edits on host reflect immediately
    env_file:
      - .env
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app
    restart: unless-stopped
    healthcheck:
      # Avoid coupling healthcheck to curl being installed in the image.
      # This uses Python (already present) to call the health endpoint.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\'http://127.0.0.1:8000/health\', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantshield-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
